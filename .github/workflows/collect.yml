name: Collect V2Ray Configs

# اجرای خودکار هر ۶ ساعت + امکان اجرای دستی
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/config.json"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        run: python scripts/collect.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sub/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 update subscription $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
